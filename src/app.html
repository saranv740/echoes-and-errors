<!doctype html>
<html lang="en">
	<head>
		%sveltekit.head%
		<script type="module">
			const theme = localStorage.getItem("color-scheme");
			if (theme) {
				document.documentElement.setAttribute("color-scheme", theme);
			}
		</script>
	</head>
	<body class="bg-main text-main" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
